<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      #content {
        display: grid;
        grid-template-rows: auto auto auto auto;
        padding-top: 1em;
        padding-bottom: 1em;
        color: white;
      }

      .card {
        padding-left: 1em;
        padding-right: 1em;
        padding-bottom: 1em;
      }
      #intro-card {
        display: grid;
        grid-template-columns: auto auto;
        background-color: #e63946;
      }

      #intro-card .emoticon {
        width: 100%;
        font-size: 5em;
        white-space: nowrap;
      }

      #skills,
      #projects {
        display: grid;
        background-color: #0077b6;
        color: 0077B6;
      }

      #projects {
        background-color: #6bd425;
        color: black;
      }
      .heading {
        grid-column-start: 1;
        grid-column-end: 5;
        text-decoration: underline;
        font-size: 2em;
      }

      .heading2 {
        grid-column-start: 1;
        grid-column-end: 5;
        font-size: 1.5em;
      }

      .skill p {
        font-size: 1.5em;
        text-align: center;
      }

      @media only screen and (max-width: 1064px) {
        #intro-card {
          grid-template-columns: auto;
          grid-template-rows: auto auto;
          column-gap: 0em;
        }

        .card {
          padding-bottom: 2em;
        }

        #skills,
        #projects {
          display: grid;
          grid-template-columns: auto;
          text-align: center;
        }

        .heading {
          grid-column-start: 1;
          grid-column-end: 1;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html" class="logo">ds1219</a>
      <a></a>
      <a href="#skills" class="links">Skills</a>
      <a href="#projects" class="links">Projects</a>
      <a href="notes.html" class="links">Notes</a>
    </nav>

    <section id="projects" class="card">
      <h1 class="heading">Notes</h1>
      <div>
        <p>
          <a class="heading2">Notes</a><br />
          (Under Construction) <br />
          [Come Back Later for more content]
        </p>
      </div>
    </section>

    <footer>
      <p>Made by ds1219</p>
    </footer>
  </body>
</html>
