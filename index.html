<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>
    <link rel="stylesheet" href="index.css" />
    <style>
      #content {
        display: grid;
        grid-template-rows: auto auto auto auto;
        row-gap: 1em;
        padding-left: 5%;
        padding-right: 5%;
        padding-top: 1em;
        padding-bottom: 1em;
      }
      .card {
        border-radius: 10px;
        color: white;
        background-color: black;

        padding-left: 1em;
        padding-right: 2em;
        padding-bottom: 1em;
      }
      #intro-card {
        display: grid;
        grid-template-columns: auto auto;
        column-gap: 2em;
      }

      #intro-card .emoticon {
        width: 100%;
        font-size: 5em;
        white-space: nowrap;
      }

      @media only screen and (max-width: 1064px) {
        #intro-card {
          grid-template-columns: auto;
          grid-template-rows: auto auto;
          column-gap: 0em;
        }

        #content {
          padding: 1em;
        }
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="ds1219.github.io" class="logo">ds1219</a>
      <a></a>
      <a href="home.html" class="links">Home</a>
      <a href="projects.html" class="links">Projects</a>
      <a href="notes.html" class="links">Notes</a>
    </nav>

    <div id="content">
      <div id="intro-card" class="card">
        <h1 class="emoticon">(⌐■_■)</h1>
        <div>
          <h1>Dulan S.</h1>
          <h2>Software Engineer</h2>
          <p>
            Hi, welcome to my personal blog and portfolio page. Here you can
            find a collection of my past projects and notes i have written
            through my developer experiences. I hope you find then useful.
          </p>
        </div>
      </div>
      <div id="skills" class="card"><h1>Skills</h1></div>
      <div id="projects" class="card"><h1>Projects</h1></div>
    </div>

    <footer>
      <p>Made by ds1219</p>
    </footer>
  </body>
</html>
